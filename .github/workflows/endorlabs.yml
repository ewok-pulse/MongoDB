name: Endor Labs Scan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      javascript-typescript: ${{ steps.filter.outputs.javascript-typescript }}
      python: ${{ steps.filter.outputs.python }}
      swift: ${{ steps.filter.outputs.swift }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |-
            javascript-typescript:
              - '**/package.json'
              - '**/package-lock.json'
              - '**/yarn.lock'
              - '**/pnpm-lock.yaml'
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
            python:
              - '**/requirements.txt'
              - '**/pyproject.toml'
              - '**/poetry.lock'
              - '**/setup.py'
              - '**/Pipfile'
              - '**/*.py'
            swift:
              - '**/Package.swift'
              - '**/*.swift'
  scan-javascript-typescript-pr:
    name: "PR Scan: javascript/typescript"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.javascript-typescript == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - &a1
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - &a2
        run: npm install -g pnpm@8
      - &a3
        run: pnpm install --frozen-lockfile
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=javascript,typescript --exclude-path=jstests/** --quick-scan"
    env:
      ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"
  scan-javascript-typescript-monitor:
    name: "Monitor Scan: javascript/typescript"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - *a1
      - *a2
      - *a3
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci"
          scan_dependencies: true
          pr: false
          enable_github_action_token: true
          additional_args: "--languages=javascript,typescript --exclude-path=jstests/**"
          sarif_file: findings.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: findings.sarif
          category: endorlabs-javascript-typescript
  scan-python-pr:
    name: "PR Scan: python"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - &a4
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - &a5
        run: pip install setuptools
      - &a6
        run: poetry config virtualenvs.in-project true && pip install poetry && poetry install --no-interaction --no-root
      - &a7
        uses: astral-sh/setup-uv@v5
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=python --exclude-path=jstests/** --quick-scan"
    env:
      ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"
  scan-python-monitor:
    name: "Monitor Scan: python"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - *a4
      - *a5
      - *a6
      - *a7
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci"
          scan_dependencies: true
          pr: false
          enable_github_action_token: true
          additional_args: "--languages=python --exclude-path=jstests/**"
          sarif_file: findings.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: findings.sarif
          category: endorlabs-python
  scan-swift-pr:
    name: "PR Scan: swift"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.swift == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - &a8
        uses: swift-actions/setup-swift@v2
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=swift --exclude-path=jstests/** --quick-scan"
    env:
      ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"
  scan-swift-monitor:
    name: "Monitor Scan: swift"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - *a8
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci"
          scan_dependencies: true
          pr: false
          enable_github_action_token: true
          additional_args: "--languages=swift --exclude-path=jstests/**"
          sarif_file: findings.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: findings.sarif
          category: endorlabs-swift
