name: Endor Labs Scan
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      javascript-typescript: ${{ steps.filter.outputs.javascript-typescript }}
      python: ${{ steps.filter.outputs.python }}
      c-net: ${{ steps.filter.outputs.c-net }}
      rust: ${{ steps.filter.outputs.rust }}
      ruby: ${{ steps.filter.outputs.ruby }}
      php: ${{ steps.filter.outputs.php }}
      swift: ${{ steps.filter.outputs.swift }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |-
            javascript-typescript:
              - '**/package.json'
              - '**/package-lock.json'
              - '**/yarn.lock'
              - '**/pnpm-lock.yaml'
              - '**/rush.json'
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
            python:
              - '**/requirements.txt'
              - '**/pyproject.toml'
              - '**/poetry.lock'
              - '**/setup.py'
              - '**/setup.cfg'
              - '**/Pipfile'
              - '**/uv.lock'
              - '**/*.py'
            c-net:
              - '**/*.csproj'
              - '**/*.sln'
              - '**/packages.lock.json'
              - '**/*.cs'
            rust:
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - '**/*.rs'
            ruby:
              - '**/Gemfile'
              - '**/Gemfile.lock'
              - '**/*.gemspec'
              - '**/*.rb'
            php:
              - '**/composer.json'
              - '**/composer.lock'
              - '**/*.php'
            swift:
              - '**/Package.swift'
              - '**/Podfile'
              - '**/*.swift'
  scan-javascript-typescript-pr:
    name: "PR Scan: javascript/typescript"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.javascript-typescript == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g pnpm@8 # pinned from pnpm-lock.yaml lockfileVersion
      - run: pnpm install --frozen-lockfile
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=javascript,typescript --quick-scan"
    env:
      ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"
  scan-javascript-typescript-monitor:
    name: "Monitor Scan: javascript/typescript"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g pnpm@8 # pinned from pnpm-lock.yaml lockfileVersion
      - run: pnpm install --frozen-lockfile
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci"
          scan_dependencies: true
          pr: false
          enable_github_action_token: true
          additional_args: "--languages=javascript,typescript"
          sarif_file: findings.sarif
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: findings.sarif
          category: endorlabs-javascript-typescript
  scan-python-pr:
    name: "PR Scan: python"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13" # detected from pyproject.toml requires-python
      - run: pip install setuptools
      - run: pip install poetry && poetry config virtualenvs.in-project true && poetry install --no-interaction --no-root
      - name: "Install subdirectory deps: buildscripts/cost_model"
        run: pip install -r buildscripts/cost_model/requirements.txt
        continue-on-error: true
      - name: "Install subdirectory deps: src/mongo/db/query/benchmark/data_generator"
        run: pip install -r src/mongo/db/query/benchmark/data_generator/requirements.txt
        continue-on-error: true
      - name: "Install subdirectory deps: src/third_party/grpc/dist"
        run: pip install -r src/third_party/grpc/dist/requirements.txt
        continue-on-error: true
      - name: "Install subdirectory deps: src/third_party/wiredtiger/test/3rdparty/testtools-2.7.1"
        run: pip install -r src/third_party/wiredtiger/test/3rdparty/testtools-2.7.1/requirements.txt
        continue-on-error: true
      - name: "Install subdirectory deps: src/third_party/wiredtiger/tools/modularity_check"
        run: pip install -r src/third_party/wiredtiger/tools/modularity_check/requirements.txt
        continue-on-error: true
      - name: "Install subdirectory deps: src/third_party/wiredtiger/tools/wt_verify"
        run: pip install -r src/third_party/wiredtiger/tools/wt_verify/requirements.txt
        continue-on-error: true
      - name: "Install subdirectory package: buildscripts/bazel_rules_mongo"
        run: pip install ./buildscripts/bazel_rules_mongo
        continue-on-error: true
      - name: "Install subdirectory package: src/third_party/wiredtiger/test/3rdparty/iso8601-2.1.0"
        run: pip install ./src/third_party/wiredtiger/test/3rdparty/iso8601-2.1.0
        continue-on-error: true
      - name: "Install subdirectory package: src/third_party/wiredtiger/test/3rdparty/python-subunit-1.4.4"
        run: pip install ./src/third_party/wiredtiger/test/3rdparty/python-subunit-1.4.4
        continue-on-error: true
      - name: "Install subdirectory package: src/third_party/wiredtiger/test/3rdparty/testtools-2.7.1"
        run: pip install ./src/third_party/wiredtiger/test/3rdparty/testtools-2.7.1
        continue-on-error: true
      - name: "Install subdirectory package: src/third_party/wiredtiger/tools/wt-mcp"
        run: pip install ./src/third_party/wiredtiger/tools/wt-mcp
        continue-on-error: true
      - uses: astral-sh/setup-uv@v5
      - uses: endorlabs/github-action@b8992820cc4d9c9e7ded5022adf6cabe2dc11946
        with:
          namespace: "endor-solutions-ypulse.github-ci"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=python --exclude-path=src/third_party/wiredtiger/test/** --quick-scan"
    env:
      ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"
  scan-python-monitor:
    name: "Monitor Scan: python"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
